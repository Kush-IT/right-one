<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - RIGHTONE</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-page">
    <div class="auth-container glass-card">
        <div class="logo-wrapper">
            <img src="images/logo.png" alt="RightOne Logo" class="logo-img">
        </div>
        <div class="auth-header">
            <h1 class="text-gradient">RIGHTONE</h1>
            <p class="text-dim">Join the premier startup marketplace</p>
        </div>

        <form id="signupForm">
            <div class="role-selector">
                <div class="role-option active" data-role="STARTUP">Startup</div>
                <div class="role-option" data-role="INVESTOR">Investor</div>
            </div>

            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="name" class="form-input" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Log in</a>
            <div style="margin-top: 1rem;">
                <a href="index.html" class="text-dim" style="font-size: 0.875rem; text-decoration: none;">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
